name: release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# Least privilege by default; each job opts into exactly what it needs.
# Actions are pinned to a commit SHA (with the human tag in a comment) so a moved
# tag can't swap in malicious code in a job that holds release/publish rights.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload assets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history + tags for the changelog
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    needs: goreleaser # publish only after the release assets exist to download
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: npm Trusted Publishing, no long-lived NPM_TOKEN
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Sync package version to the tag
        working-directory: npm
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
      # No NODE_AUTH_TOKEN: auth is the workflow's OIDC identity. Requires a
      # Trusted Publisher configured for @ivorpad/mercadona on npmjs.com (one-time).
      - name: Publish to npm (OIDC Trusted Publishing + provenance)
        working-directory: npm
        run: npm publish --provenance --access public
